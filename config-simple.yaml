# 必读！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅，如果有多个，复制一份Airport1的配置，注意名字不要和Airport1重复
proxy-providers:
  ednovas:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
# 节点信息
proxies:
  - name: 直连
    type: direct
# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# interface-name: enp6s18
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
# 跑裸核朋友自行删除注释即可
external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: "/etc/mihomo/ui"
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# 入站  
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://119.29.29.29/dns-query
    - https://1.12.12.12/dns-query
    - https://120.53.53.53/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
 
# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，比如删除香港故转，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
proxy-groups:
  - {name: 🇦🇺 远程访问, type: select,include-all: true , url: "http://192.168.31.1" , filter: "^(?=.*澳大利亚|澳洲|墨尔本|悉尼)(?=.*远程).*$" , proxies: [🇦🇺 自动远程节点组]}
  - {name: 🗺️ 代理, type: select, proxies: [♻️ 自动选择节点组,🚀 手动选择节点组,🔏 家宽独享节点组,🚌 机场共享点组,直连]}
  - {name: 🎯 直连, type: select, proxies: [直连,♻️ 自动选择节点组,🚀 手动选择节点组,🔏 家宽独享节点组,🚌 机场共享点组]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [直连,♻️ 自动选择节点组,🚀 手动选择节点组,🔏 家宽独享节点组,🚌 机场共享点组]}
#节点组
  - {name: 🚀 手动选择节点组, type: select, include-all: true, tolerance: 20, interval: 300, filter: "^(?!.*(远程)).*$"}
  - {name: ♻️ 自动选择节点组, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^(?!.*(cn|🇨🇳|远程|直连|中国)).*$"}
  - {name: 🔏 家宽独享节点组, type: select, include-all: true, filter: "^.*(私有|个人|私人|自建|家宽).*$"}
  - {name: 🚌 机场共享点组, type: select, include-all: true, filter: "^(?!.*(私有|个人|私人|自建|家宽|远程|直连)).*$"}
  - {name: 🇦🇺 自动远程节点组, type: url-test, url: "http://192.168.31.1" , include-all: true, tolerance: 10, interval: 300, filter: "^(?=.*澳大利亚|澳洲|墨尔本|悉尼)(?=.*远程).*$"}

# 规则匹配
# 此规则部分没有做防泄露处理，因为弊严重大于利！
rules:
  - RULE-SET,direct_domain,🎯 直连
  - RULE-SET,proxylite,🗺️ 代理
  - RULE-SET,private_domain,直连
  - RULE-SET,apple_domain,🎯 直连
  - RULE-SET,ai,🗺️ 代理
  - RULE-SET,github_domain,🗺️ 代理
  - RULE-SET,youtube_domain,🗺️ 代理
  - RULE-SET,google_domain,🗺️ 代理
  - RULE-SET,onedrive_domain,🎯 直连
  - RULE-SET,microsoft_domain,🎯 直连
  - RULE-SET,tiktok_domain,🗺️ 代理
  - RULE-SET,speedtest_domain,🎯 直连
  - RULE-SET,telegram_domain,🗺️ 代理
  - RULE-SET,netflix_domain,🗺️ 代理
  - RULE-SET,paypal_domain,🎯 直连
  - RULE-SET,gfw_domain,🗺️ 代理
  - RULE-SET,geolocation-!cn,🗺️ 代理
  - RULE-SET,cn_domain,🎯 直连
  - RULE-SET,google_ip,🗺️ 代理,no-resolve
  - RULE-SET,netflix_ip,🗺️ 代理,no-resolve
  - RULE-SET,telegram_ip,🗺️ 代理,no-resolve
  - RULE-SET,cn_ip,🎯 直连
  - MATCH,🐟 漏网之鱼

# 规则集
